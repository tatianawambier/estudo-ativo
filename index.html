<title>Estudo Ativo</title>
<style>
  :root{
    --bg:#0f1226; --bg2:#171a35; --card:#1f2347; --card2:#272c54;
    --ink:#eef1ff; --muted:#a8aee0; --line:#3a3f72;
    --brand:#7c8cff; --brand2:#56e0c4; --ok:#37d399; --warn:#ffcf6b; --bad:#ff7a90;
    --shadow:0 10px 30px rgba(0,0,0,.35); --r:18px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 70% -10%,#222a5e 0%,var(--bg) 55%);
    color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
  .app{max-width:760px;margin:0 auto;padding:18px 16px 120px}
  header.bar{position:sticky;top:0;z-index:20;backdrop-filter:blur(8px);
    background:linear-gradient(180deg,rgba(15,18,38,.95),rgba(15,18,38,.6));
    padding:10px 16px;margin:-18px -16px 14px;border-bottom:1px solid var(--line)}
  .bar-row{display:flex;align-items:center;gap:12px;max-width:760px;margin:0 auto}
  .logo{font-weight:800;letter-spacing:.3px;font-size:16px;white-space:nowrap}
  .logo span{color:var(--brand2)}
  .progress{flex:1;height:10px;background:var(--bg2);border-radius:99px;overflow:hidden;border:1px solid var(--line)}
  .progress>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--brand),var(--brand2));transition:width .4s ease}
  .pill{font-size:12px;color:var(--muted);white-space:nowrap}
  .pill b{color:var(--ink)}

  .card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);
    border-radius:var(--r);padding:22px;box-shadow:var(--shadow);animation:rise .35s ease}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .tag{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;
    padding:5px 10px;border-radius:99px;margin-bottom:14px;text-transform:uppercase;letter-spacing:.6px}
  .tag.read{background:rgba(124,140,255,.18);color:#c3ccff}
  .tag.q{background:rgba(86,224,196,.16);color:#9af0dd}
  .tag.rev{background:rgba(255,207,107,.16);color:#ffe2a6}
  .tag.fx{background:rgba(255,122,144,.16);color:#ffc0cb}
  .tag.img{background:rgba(180,150,255,.18);color:#dcccff}
  .tag.final{background:rgba(124,140,255,.25);color:#fff}
  .src{font-size:11px;color:var(--muted);float:right;margin-top:4px}

  h1{font-size:23px;margin:0 0 10px;line-height:1.25}
  .lead{font-size:17px;line-height:1.7}
  .line{font-size:17px;line-height:1.55;margin:10px 0}
  .line b{color:#fff}
  .q-text{font-size:18px;line-height:1.5;font-weight:600;margin:2px 0 14px}
  .hint{font-size:14px;color:var(--muted);line-height:1.55}
  .breadcrumb{font-size:13px;color:var(--muted);margin-bottom:8px}

  .formula{font-size:30px;text-align:center;color:#fff;font-weight:700;
    background:radial-gradient(120% 140% at 50% 0,#2c3475 0%,#1b2150 70%);
    border:1.5px solid var(--brand);border-radius:16px;padding:28px 18px;margin:16px 0;
    box-shadow:inset 0 0 0 1px rgba(124,140,255,.18),0 8px 26px rgba(124,140,255,.14);letter-spacing:.5px}
  .frac{display:inline-flex;flex-direction:column;vertical-align:middle;text-align:center;margin:0 .18em;font-size:.82em}
  .frac .num{padding:0 .5em;border-bottom:2.5px solid currentColor;line-height:1.3}
  .frac .den{padding:0 .5em;line-height:1.3}
  .terms{margin:8px 0 2px;background:var(--bg2);border:1px solid var(--line);border-radius:13px;padding:14px 16px}
  .terms .lbl{font-size:13px;color:var(--brand2);font-weight:800;margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
  .terms .t{font-size:16px;line-height:1.5;padding:4px 0}
  .terms .t b{color:#fff}

  .opts{display:flex;flex-direction:column;gap:10px;margin-top:6px}
  .opt{display:flex;gap:12px;align-items:flex-start;background:var(--bg2);border:1.5px solid var(--line);
    border-radius:13px;padding:13px 15px;cursor:pointer;line-height:1.45;font-size:16px;transition:.12s}
  .opt:hover{border-color:var(--brand)}
  .opt .mk{width:24px;height:24px;border-radius:50%;border:2px solid var(--line);flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--muted)}
  .opt.correct{border-color:var(--ok);background:rgba(55,211,153,.14)}
  .opt.correct .mk{border-color:var(--ok);color:#06241a;background:var(--ok)}
  .opt.wrong{border-color:var(--bad);background:rgba(255,122,144,.12)}
  .opt.wrong .mk{border-color:var(--bad);color:#fff;background:var(--bad)}
  .opt.locked{cursor:default}

  /* numérico com unidade fixa */
  .numrow{display:flex;gap:10px;align-items:stretch}
  .numrow input{flex:1}
  .unit-badge{display:flex;align-items:center;background:var(--bg2);border:1.5px solid var(--line);
    border-radius:14px;padding:0 16px;font-size:17px;color:var(--brand2);font-weight:800;white-space:nowrap}
  input[type=text]{width:100%;background:var(--bg2);border:1.5px solid var(--line);color:var(--ink);
    border-radius:14px;padding:14px;font-size:16px;font-family:inherit;line-height:1.5}
  input:focus{outline:none;border-color:var(--brand)}

  /* associar pares */
  .matchrow{display:flex;gap:10px;align-items:center;margin:9px 0}
  .matchlab{flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:11px 13px;font-size:15px;line-height:1.35}
  .matchsel{flex:1;background:var(--bg2);border:1.5px solid var(--line);color:var(--ink);border-radius:11px;padding:11px;font-size:15px;font-family:inherit}
  .matchsel:focus{outline:none;border-color:var(--brand)}
  .matchsel.ok{border-color:var(--ok)} .matchsel.bad{border-color:var(--bad)}

  .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
  button{font-family:inherit;font-size:15px;font-weight:700;border:none;border-radius:13px;
    padding:13px 18px;cursor:pointer;transition:transform .08s ease,filter .15s ease}
  button:active{transform:translateY(1px)}
  .btn{background:linear-gradient(90deg,var(--brand),#6f7dff);color:#fff}
  .btn.alt{background:var(--card2);color:var(--ink);border:1.5px solid var(--line)}
  .btn.ok{background:linear-gradient(90deg,#2fbf85,var(--ok));color:#06241a}
  .btn.small{padding:9px 13px;font-size:13px}
  .btn:disabled{opacity:.4;cursor:not-allowed}

  .feedback{margin-top:16px;border-radius:14px;padding:16px;border:1px solid var(--line);background:var(--bg2);animation:rise .3s ease}
  .feedback.good{border-color:var(--ok)} .feedback.bad{border-color:var(--bad)}
  .feedback h4{margin:0 0 8px;font-size:13px;letter-spacing:.5px;text-transform:uppercase}
  .feedback.good h4{color:var(--ok)} .feedback.bad h4{color:var(--bad)}
  .feedback p{margin:0;line-height:1.6}

  .steps{margin-top:12px;border-left:3px solid var(--brand);padding-left:14px}
  .steps .step{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:8px 0;line-height:1.55;animation:rise .3s ease}
  .qprog{font-size:12px;color:var(--muted);margin-bottom:8px}

  .fc-counter{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
    background:var(--card2);border:1px solid var(--line);color:var(--ink);padding:12px 18px;
    border-radius:99px;box-shadow:var(--shadow);opacity:0;transition:.3s;font-size:14px;font-weight:600;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .flash{perspective:1200px}
  .flash-inner{position:relative;min-height:200px;border-radius:16px;cursor:pointer;transition:transform .5s;transform-style:preserve-3d}
  .flash-inner.flip{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;
    display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;border:1px solid var(--line);font-size:19px;line-height:1.5}
  .face.front{background:linear-gradient(180deg,var(--card),var(--card2))}
  .face.back{background:linear-gradient(180deg,#243a52,#1f3247);transform:rotateY(180deg);color:#dffaf0}
  .fc-cat{position:absolute;top:12px;left:0;right:0;text-align:center;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted)}

  .summary .stat{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line)}
  .summary .stat:last-child{border-bottom:none}
  .summary .stat b{font-size:18px}
  .center{text-align:center}.muted{color:var(--muted)}.big{font-size:46px;line-height:1;margin:6px 0}
  svg.diagram{width:100%;height:auto;background:#0e1430;border:1px solid var(--line);border-radius:14px;margin:6px 0}
  .figdoc{display:block;width:100%;max-width:540px;margin:8px auto;border:1px solid var(--line);border-radius:14px}
  .figwrap{position:relative;max-width:540px;margin:8px auto}
  .figwrap img{display:block;width:100%;border:1px solid var(--line);border-radius:14px}
  .figdoc,.figwrap img,.sheet .rfig img{cursor:zoom-in}
  .ztag{display:block;text-align:center;font-size:12px;color:var(--muted);margin:-2px 0 6px}
  .lightbox{position:fixed;inset:0;background:rgba(8,9,20,.94);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;padding:env(safe-area-inset-top) 10px env(safe-area-inset-bottom)}
  .lightbox.on{display:flex}
  .lightbox .lb-scroll{width:100%;height:100%;overflow:auto;display:flex;align-items:center;justify-content:center;-webkit-overflow-scrolling:touch}
  .lightbox img{max-width:none;width:auto;height:auto;min-width:92vw;border-radius:10px;background:#fff}
  .lightbox .lb-close{position:fixed;top:calc(env(safe-area-inset-top) + 10px);right:14px;width:44px;height:44px;border-radius:50%;border:none;background:#fff;color:#111;font-size:24px;font-weight:700;cursor:pointer;z-index:1}
  .lightbox .lb-hint{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 14px);left:0;right:0;text-align:center;color:#cfd3ff;font-size:13px}
  .figmark{position:absolute;width:26px;height:26px;border:4px solid #ff3b6b;border-radius:50%;
    transform:translate(-50%,-50%);animation:pulsemark 1.2s infinite}
  @keyframes pulsemark{0%{box-shadow:0 0 0 2px rgba(255,59,107,.55)}70%{box-shadow:0 0 0 13px rgba(255,59,107,0)}100%{box-shadow:0 0 0 2px rgba(255,59,107,0)}}
  /* destaque colorido sobre fundo preto-e-branco */
  .spotwrap{position:relative;max-width:560px;margin:8px auto;background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .spotwrap img{display:block;width:100%}
  .spotwrap .spotgray{filter:grayscale(1) brightness(.7) contrast(.95)}
  .spotwrap .spotcol{position:absolute;top:0;left:0;filter:saturate(1.2) brightness(1.05)}
  .kbd{font-size:12px;color:var(--muted);margin-top:12px;line-height:1.5}

  /* home / seletor de matéria */
  .home-card{display:flex;gap:14px;align-items:center;background:var(--bg2);border:1.5px solid var(--line);
    border-radius:16px;padding:18px;cursor:pointer;margin:12px 0;transition:.12s}
  .home-card:hover{border-color:var(--brand);transform:translateY(-1px)}
  .home-emoji{font-size:34px;flex:0 0 auto}
  .home-card h3{margin:0 0 4px;font-size:18px}
  .home-card p{margin:0;font-size:13px;color:var(--muted);line-height:1.45}
  .backbar{display:inline-block;font-size:13px;color:var(--muted);cursor:pointer;margin-bottom:10px;background:none;padding:6px 0}

  /* folha de resumo imprimível */
  .sheet{background:#fff;color:#16182e;border-radius:12px;padding:24px}
  .sheet h2{margin:0 0 2px;font-size:21px}
  .sheet .sub{font-size:12px;color:#555;margin-bottom:14px}
  .sheet .grp{margin:12px 0;break-inside:avoid;border-left:5px solid var(--c,#4b46d6);background:var(--bg,#f4f4fc);border-radius:9px;padding:9px 13px}
  .sheet .grp h3{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:#fff;background:var(--c,#4b46d6);display:inline-block;padding:3px 11px;border-radius:99px;margin:0 0 8px}
  .sheet .item{font-size:13.5px;line-height:1.55;margin:5px 0;color:#23252e}
  .sheet .item b{color:var(--c,#16182e)}
  .sheet .figrow{display:flex;flex-wrap:wrap;gap:12px;margin-top:6px}
  .sheet .rfig{margin:0;width:47%;break-inside:avoid}
  .sheet .rfig img{width:100%;border:1px solid #d4d4e4;border-radius:8px;display:block}
  .sheet .rfig figcaption{font-size:11px;color:#555;text-align:center;margin-top:3px}
  @media print{
    .bar,.toast,.noprint{display:none!important}
    body{background:#fff}
    .app{padding:0;max-width:none}
    .card{box-shadow:none;border:none;background:transparent;padding:0}
    .sheet{padding:0}
  }
</style>
</head>

<header class="bar">
  <div class="bar-row">
    <div class="logo">Estudo<span>Ativo</span></div>
    <div class="progress"><i id="bar"></i></div>
    <div class="pill" id="pill">—</div>
  </div>
</header>

  <div class="lb-scroll"><img id="lb-img" alt="figura ampliada"></div>
  <div class="lb-hint">Toque para fechar &middot; arraste para ver detalhes</div>
</div>

function setProgress(){

  pill.innerHTML='Bloco <b>'+Math.min(idx+1,STEPS.length)+'</b>/<b>'+STEPS.length+'</b>';

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);}
function next(){ if(idx<STEPS.length-1){ idx++; render(); window.scrollTo({top:0,behavior:'smooth'}); } }
function parseNum(s){
  if(s==null) return NaN;
  s=(''+s).trim().toLowerCase().replace(/\s/g,'').replace(/(m\/s²|m\/s2|m\/s|km\/h|km|m|s)$/,'').replace(',', '.');
  const m=s.match(/-?\d+(\.\d+)?/); return m?parseFloat(m[0]):NaN;
}
function linesHTML(a){ return (a||[]).map(l=>'<p class="line">'+l+'</p>').join(''); }
function termsHTML(a){ if(!a||!a.length) return '';
  return '<div class="terms"><div class="lbl">Sendo que:</div>'+a.map(t=>{const i=t.indexOf(':');const sym=i>=0?t.slice(0,i):t;const rest=i>=0?t.slice(i+1):'';return '<div class="t"><b>'+sym+(i>=0?':':'')+'</b>'+rest+'</div>';}).join('')+'</div>'; }

/* ---- escolhas de múltipla escolha (embaralhadas), reutilizável ---- */
let lastCorrectPos=-1;
function mcChoices(wrap, options, correctIndex, explain, cb, doShuffle){
  let opts, correctIdx;
  if(doShuffle){
    function shuf(){ const order=options.map((_,i)=>i);
      for(let j=order.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));const t=order[j];order[j]=order[k];order[k]=t;}
      return order; }
    let order=shuf();
    // evita a resposta certa cair na mesma letra de uma pergunta para a outra
    for(let tries=0; tries<8 && order.indexOf(correctIndex)===lastCorrectPos; tries++){ order=shuf(); }
    opts=order.map(i=>options[i]); correctIdx=order.indexOf(correctIndex); lastCorrectPos=correctIdx;
  } else { opts=options.slice(); correctIdx=correctIndex; }
  const box=document.createElement('div'); box.className='opts'; wrap.appendChild(box);
  let done=false;
  opts.forEach((txt,i)=>{
    const o=document.createElement('div'); o.className='opt';
    o.innerHTML='<div class="mk">'+String.fromCharCode(65+i)+'</div><div>'+txt+'</div>';
    o.onclick=()=>{
      if(done) return; done=true; stats.attempts++;
      box.querySelectorAll('.opt').forEach(e=>e.classList.add('locked'));
      const correct=(i===correctIdx); o.classList.add(correct?'correct':'wrong');
      const fb=document.createElement('div');
      if(correct){ stats.correct++; box.children[correctIdx].classList.add('correct');
        fb.className='feedback good'; fb.innerHTML='<h4>✅ Correto!</h4><p>'+(explain||'')+'</p>'; wrap.appendChild(fb);
        const r=document.createElement('div'); r.className='row'; r.innerHTML='<button class="btn ok" id="c">Continuar →</button>'; wrap.appendChild(r);
        document.getElementById('c').onclick=cb.ok; toast('Boa! 🎉');
      }else{
        fb.className='feedback bad'; fb.innerHTML='<h4>❌ Ainda não</h4><p>A resposta não fica aqui. Volte ao texto, releia e tente de novo.</p>'; wrap.appendChild(fb);
        const r=document.createElement('div'); r.className='row'; r.innerHTML='<button class="btn" id="b">Reler o trecho →</button>'; wrap.appendChild(r);
        document.getElementById('b').onclick=cb.back; toast('Vamos reler 🔁');
      }
    };
    box.appendChild(o);
  });
  const nr=document.createElement('div'); nr.className='row';
  nr.innerHTML='<button class="btn alt small" id="dk">Não lembro — rever o texto</button>'; wrap.appendChild(nr);
  document.getElementById('dk').onclick=()=>{ if(!done) cb.back(); };
}

/* mc / tf / cloze */
function renderMC(q, host, cb){
  const wrap=document.createElement('div'); wrap.innerHTML='<p class="q-text">'+q.q+'</p>'; host.appendChild(wrap);
  if(q.type==='tf') mcChoices(wrap, ['Verdadeiro','Falso'], (q.correct?0:1), q.explain, cb, false);
  else mcChoices(wrap, q.options, q.correct, q.explain, cb, true);
}
/* identificar na figura (SVG esquemático — física) */
function renderFigure(item, host, cb){
  const wrap=document.createElement('div');
  wrap.innerHTML='<p class="q-text">'+item.q+'</p>'+diagramSVG(item.fig, item.highlight);
  host.appendChild(wrap);
  mcChoices(wrap, item.options, item.correct, item.explain, cb, true);
}
/* identificar na figura (imagem real do livro, com marcador) */
function renderFigImg(item, host, cb){
  const wrap=document.createElement('div');
  const mark=item.mark?'<span class="figmark" style="left:'+item.mark[0]+'%;top:'+item.mark[1]+'%"></span>':'';
  wrap.innerHTML='<p class="q-text">'+item.q+'</p><div class="figwrap"><img src="'+IMG[item.img]+'" alt="figura do livro">'+mark+'</div>';
  host.appendChild(wrap);
  mcChoices(wrap, item.options, item.correct, item.explain, cb, true);
}
/* associar pares */
function renderMatch(item, host, cb){
  const wrap=document.createElement('div'); wrap.innerHTML='<p class="q-text">'+item.q+'</p>'; host.appendChild(wrap);
  const rights=item.pairs.map(p=>p[1]);
  const shuffled=rights.slice();
  for(let j=shuffled.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));const t=shuffled[j];shuffled[j]=shuffled[k];shuffled[k]=t;}
  const sels=[];
  item.pairs.forEach(p=>{
    const rowEl=document.createElement('div'); rowEl.className='matchrow';
    const lab=document.createElement('div'); lab.className='matchlab'; lab.innerHTML=p[0];
    const sel=document.createElement('select'); sel.className='matchsel';
    sel.innerHTML='<option value="">— escolha —</option>'+shuffled.map(r=>'<option value="'+r.replace(/"/g,'&quot;')+'">'+r+'</option>').join('');
    rowEl.appendChild(lab); rowEl.appendChild(sel); wrap.appendChild(rowEl);
    sels.push({sel,correct:p[1]});
  });
  const row=document.createElement('div'); row.className='row';
  row.innerHTML='<button class="btn" id="vf">Verificar</button><button class="btn alt small" id="dk">Não lembro — rever o texto</button>';
  wrap.appendChild(row);
  let done=false;
  document.getElementById('vf').onclick=()=>{
    if(done) return;
    if(sels.some(s=>!s.sel.value)){ toast('Preencha todos os pares'); return; }
    stats.attempts++;
    const allok=sels.every(s=>s.sel.value===s.correct);
    if(allok){ done=true; stats.correct++;
      sels.forEach(s=>{s.sel.classList.add('ok');s.sel.disabled=true;});
      const fb=document.createElement('div'); fb.className='feedback good'; fb.innerHTML='<h4>✅ Correto!</h4><p>'+(item.explain||'')+'</p>'; wrap.appendChild(fb);
      const r=document.createElement('div'); r.className='row'; r.innerHTML='<button class="btn ok" id="c">Continuar →</button>'; wrap.appendChild(r);
      document.getElementById('c').onclick=cb.ok; toast('Boa! 🎉');
    }else{
      sels.forEach(s=>{ s.sel.classList.remove('ok'); s.sel.classList.toggle('bad', s.sel.value!==s.correct); });
      const fb=document.createElement('div'); fb.className='feedback bad'; fb.innerHTML='<h4>❌ Alguns pares estão errados</h4><p>Os marcados em vermelho não estão certos. Volte ao texto, releia e tente de novo.</p>'; wrap.appendChild(fb);
      const r=document.createElement('div'); r.className='row'; r.innerHTML='<button class="btn" id="b">Reler o trecho →</button>'; wrap.appendChild(r);
      document.getElementById('b').onclick=cb.back; toast('Vamos reler 🔁');
    }
  };
  document.getElementById('dk').onclick=()=>{ if(!done) cb.back(); };
}
/* numérico com passos e unidade fixa */
function renderNum(item, host, cb){
  const wrap=document.createElement('div'); wrap.innerHTML='<p class="q-text">'+(item.q||item.prompt||'')+'</p>'; host.appendChild(wrap);
  const numrow=document.createElement('div'); numrow.className='numrow';
  const inp=document.createElement('input'); inp.type='text'; inp.inputMode='decimal'; inp.placeholder='Digite só o número';
  numrow.appendChild(inp);
  if(item.unit){ const u=document.createElement('div'); u.className='unit-badge'; u.textContent=item.unit; numrow.appendChild(u); }
  wrap.appendChild(numrow);
  const row=document.createElement('div'); row.className='row';
  row.innerHTML='<button class="btn" id="vf">Verificar</button>'+
    (item.steps?'<button class="btn alt" id="hint">Não consegui — próximo passo</button>':'')+
    '<button class="btn alt small" id="back">Rever a fórmula</button>';
  wrap.appendChild(row);
  const stepsBox=document.createElement('div'); stepsBox.className='steps'; stepsBox.style.display='none'; wrap.appendChild(stepsBox);
  let revealed=0, done=false;
  function revealStep(){
    if(!item.steps||revealed>=item.steps.length){ toast('Esse era o último passo 🙂'); return; }
    stepsBox.style.display='block';
    const d=document.createElement('div'); d.className='step'; d.innerHTML='<b>Passo '+(revealed+1)+':</b> '+item.steps[revealed]; stepsBox.appendChild(d);
    revealed++; stats.stepsUsed++;
    if(revealed>=item.steps.length){ const h=document.getElementById('hint'); if(h){h.textContent='Todos os passos revelados';h.disabled=true;} }
  }
  document.getElementById('vf').onclick=()=>{
    const v=parseNum(inp.value); if(isNaN(v)){ toast('Digite um número'); return; }
    stats.attempts++;
    if(Math.abs(v-item.answer)<=(item.tol||0.01)){
      done=true; stats.correct++; stats.exercises++; inp.disabled=true;
      const fb=document.createElement('div'); fb.className='feedback good'; fb.innerHTML='<h4>✅ Isso!</h4><p>Resposta: <b>'+item.answer+' '+(item.unit||'')+'</b></p>'; wrap.appendChild(fb);
      const r=document.createElement('div'); r.className='row'; r.innerHTML='<button class="btn ok" id="c">Continuar →</button>'; wrap.appendChild(r);
      document.getElementById('c').onclick=cb.ok; toast('Boa! 🎉');
    }else{ toast('Ainda não — veja o próximo passo ou reveja a fórmula.'); revealStep(); }
  };
  const hb=document.getElementById('hint'); if(hb) hb.onclick=revealStep;
  document.getElementById('back').onclick=cb.back;
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('vf').click(); });
}

/* lacuna digitada (o aluno ESCREVE a palavra) */
function normTxt(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9 ]/g,' ').trim().replace(/\s+/g,' '); }
function renderTyped(item, host, cb){
  const wrap=document.createElement('div');
  wrap.innerHTML='<p class="q-text">'+item.q+'</p>'+(item.img?'<div class="figwrap"><img src="'+IMG[item.img]+'" alt="figura numerada"></div><span class="ztag">🔍 Toque na figura para ampliar</span>':'');
  host.appendChild(wrap);
  const inp=document.createElement('input'); inp.type='text'; inp.placeholder='Digite a resposta…'; wrap.appendChild(inp);
  const row=document.createElement('div'); row.className='row';
  row.innerHTML='<button class="btn" id="vf">Verificar</button><button class="btn alt small" id="dk">Não lembro — rever o texto</button>';
  wrap.appendChild(row);
  let done=false;
  function check(){
    if(done) return;
    const v=normTxt(inp.value);
    if(v.length<2){ toast('Escreva a palavra'); return; }
    const accs=(item.accept||[]).map(normTxt);
    const ok = accs.some(a=>a===v) || accs.some(a=>a.length>=4 && (v===a || v.endsWith(' '+a) || v.includes(a)));
    stats.attempts++;
    if(ok){ done=true; stats.correct++; inp.disabled=true;
      const fb=document.createElement('div'); fb.className='feedback good'; fb.innerHTML='<h4>✅ Isso!</h4><p>'+(item.explain||'')+'</p>'; wrap.appendChild(fb);
      const r=document.createElement('div'); r.className='row'; r.innerHTML='<button class="btn ok" id="c">Continuar →</button>'; wrap.appendChild(r);
      document.getElementById('c').onclick=cb.ok; toast('Boa! 🎉');
    }else{
      const fb=document.createElement('div'); fb.className='feedback bad'; fb.innerHTML='<h4>❌ Ainda não</h4><p>A resposta não fica aqui. Volte ao texto, releia e tente escrever de novo.</p>'; wrap.appendChild(fb);
      const r=document.createElement('div'); r.className='row'; r.innerHTML='<button class="btn" id="b">Reler o trecho →</button>'; wrap.appendChild(r);
      document.getElementById('b').onclick=cb.back; toast('Vamos reler 🔁');
    }
  }
  document.getElementById('vf').onclick=check;
  document.getElementById('dk').onclick=()=>{ if(!done) cb.back(); };
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') check(); });
}

/* destaque colorido: figura em cinza, só a estrutura marcada em cor */
function renderSpot(item, host, cb){
  const wrap=document.createElement('div');
  const r=item.r||11, x=item.at[0], y=item.at[1];
  const cp='circle('+r+'% at '+x+'% '+y+'%)';
  wrap.innerHTML='<p class="q-text">'+item.q+'</p>'+
    '<div class="spotwrap">'+
      '<img class="spotgray" src="'+IMG[item.img]+'" alt="figura">'+
      '<img class="spotcol" src="'+IMG[item.img]+'" alt="estrutura em destaque" style="clip-path:'+cp+';-webkit-clip-path:'+cp+'">'+
    '</div>';
  host.appendChild(wrap);
  mcChoices(wrap, item.options, item.correct, item.explain, cb, true);
}

/* roteia o item para o renderer certo */
function renderItem(item, host, cb){
  const t=item.type;
  if(t==='mc'||t==='tf'||t==='cloze') renderMC(item, host, cb);
  else if(t==='match') renderMatch(item, host, cb);
  else if(t==='figure') renderFigure(item, host, cb);
  else if(t==='figimg') renderFigImg(item, host, cb);
  else if(t==='typed') renderTyped(item, host, cb);
  else if(t==='spot') renderSpot(item, host, cb);
  else renderNum(item, host, cb);
}

/* controlador ESTUDO → EVOCAÇÃO */
function runBlock(card, opts){
  addCards(opts.cards);
  const items=opts.items, total=items.length; let i=0;
  function study(reread){
    card.className='card'; let h='';
    if(opts.src) h+='<div class="src">Fonte: '+opts.src+'</div>';
    h+='<div class="tag '+(opts.tagClass||'read')+'">'+(opts.tagIcon||'')+opts.tag+'</div>';
    if(opts.title) h+='<h1>'+opts.title+'</h1>';
    if(reread) h+='<div class="feedback bad"><h4>🔁 Reveja com atenção</h4><p>'+reread+'</p></div>';
    if(opts.image) h+='<img class="figdoc" src="'+IMG[opts.image]+'" alt="figura do livro"><span class="ztag">🔍 Toque na figura para ampliar</span>';
    else if(opts.diagram) h+=diagramSVG(opts.diagram);
    else if(opts.illus) h+=diagramSVG(opts.illus);
    if(opts.lines) h+=linesHTML(opts.lines);
    if(opts.formula) h+='<div class="formula">'+opts.formula+'</div>'+termsHTML(opts.terms);
    h+='<div class="row"><button class="btn" id="ok">'+(reread?'Voltar à pergunta →':(opts.studyBtn||'Entendi — responder de memória →'))+'</button></div>';
    card.innerHTML=h; document.getElementById('ok').onclick=quiz;
  }
  function quiz(){
    card.className='card';
    let h='<div class="tag q">🧠 De memória — '+(opts.formula?'fórmula escondida':'texto escondido')+'</div>';
    if(opts.title) h+='<div class="breadcrumb">Tópico: <b>'+opts.title+'</b></div>';
    if(total>1) h+='<div class="qprog">'+(opts.unitWord||'Pergunta')+' '+(i+1)+' de '+total+'</div>';
    card.innerHTML=h;
    const host=document.createElement('div'); card.appendChild(host);
    renderItem(items[i], host, { ok:()=>{ i++; if(i<total) quiz(); else finish(); }, back:()=>{ stats.rereads++; study(opts.rereadMsg||'Releia o trecho e responda de novo — você consegue.'); } });
  }
  function finish(){
    card.className='card';
    card.innerHTML='<div class="feedback good"><h4>✅ Concluído!</h4><p>Você respondeu tudo certo, de memória. Pode seguir.</p></div>'+
      '<div class="row"><button class="btn ok" id="nx">Avançar →</button></div>';
    document.getElementById('nx').onclick=next;
  }
  study(null);
}

/* --- Lightbox: tocar na figura para ampliar (legibilidade no celular) --- */
function openLightbox(src){
  var lb=document.getElementById('lightbox'), img=document.getElementById('lb-img');
  img.onload=function(){
    var vw=window.innerWidth||360;
    var target=Math.min(img.naturalWidth||vw*2, Math.round(vw*2.2));
    target=Math.max(target, Math.round(vw*1.7));
    img.style.width=target+'px';
    var sc=lb.querySelector('.lb-scroll'); if(sc) sc.scrollLeft=(target-vw)/2;
  };
  img.src=src; lb.classList.add('on'); document.body.style.overflow='hidden';
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('on');
  document.body.style.overflow='';
}
document.addEventListener('click',function(e){
  var t=e.target;
  if(t&&t.tagName==='IMG'&&!t.closest('.lightbox')&&(t.classList.contains('figdoc')||t.closest('.figwrap')||t.closest('.rfig'))){
    openLightbox(t.src);
  }
},true);

function home(){
  STEPS=[]; chapter=null; setProgress();
  stage.innerHTML='';
  const card=document.createElement('div'); card.className='card';
  let h='<div class="tag read">Escolha o que estudar</div><h1>Estudo Ativo</h1>'+
    '<p class="line">Leitura que te obriga a pensar: você lê, o texto some e responde de memória. Escolha uma matéria:</p>';
  Object.values(CHAPTERS).forEach(c=>{
    h+='<div class="home-card" data-k="'+c.key+'"><div class="home-emoji">'+c.emoji+'</div>'+
       '<div><h3>'+c.subject+' — '+c.title+'</h3><p>'+c.source+'</p></div></div>';
  });
  h+='<div class="kbd">Protótipo. Cada matéria foi construída a partir do material real enviado.</div>';
  card.innerHTML=h; stage.appendChild(card);
  card.querySelectorAll('.home-card').forEach(el=> el.onclick=()=>startChapter(el.dataset.k));
}
function startChapter(key){ chapter=CHAPTERS[key]; STEPS=chapter.steps; idx=0; deck.length=0; stats={correct:0,attempts:0,exercises:0,stepsUsed:0,rereads:0}; render(); window.scrollTo({top:0}); }

/* =====================================================================
   RENDER POR TIPO
   ===================================================================== */
function render(){
  setProgress();
  const s=STEPS[idx]; stage.innerHTML='';
  const card=document.createElement('div'); card.className='card';

  if(s.type==='intro'){
    const jOpts='<option value="">— escolher um bloco —</option>'+STEPS.map((st,i)=>{
      if(st.type==='intro') return '';
      const lab=st.title||st.name||(st.type==='review'?('Revisão: '+st.from):st.type==='final'?'Teste final':st.type==='deck'?'Flashcards':st.type==='summary'?'Resumo':st.type);
      return '<option value="'+i+'">'+i+' — '+lab+'</option>';
    }).join('');
    card.innerHTML=
      '<button class="backbar" id="home">← Matérias</button>'+
      '<div class="tag read">'+chapter.emoji+' '+chapter.subject+'</div>'+
      '<h1>'+chapter.title+'</h1>'+
      '<div class="muted" style="margin-bottom:14px">Baseado no seu material ('+chapter.source+')</div>'+
      linesHTML(chapter.intro)+
      '<div class="row"><button class="btn" id="go">Começar a estudar →</button>'+
      '<button class="btn alt" id="vresumo">📄 Ver / imprimir resumo</button></div>'+
      '<div class="kbd">O resumo de 1 página fica disponível a qualquer momento. Flashcards: <span class="fc-counter">📇 <b id="fcCount">0</b></span> — criados conforme você avança.</div>'+
      (TEST? '<div class="kbd" style="margin-top:10px;border-top:1px dashed var(--line);padding-top:10px">🔧 Atalho de teste — pular para: <select id="jump" class="matchsel" style="max-width:300px;display:inline-block;width:auto">'+jOpts+'</select></div>' : '');
    stage.appendChild(card);
    document.getElementById('go').onclick=next;
    document.getElementById('home').onclick=home;
    document.getElementById('vresumo').onclick=showResumo;
    if(TEST){ const js=document.getElementById('jump'); if(js) js.onchange=function(){ if(this.value!==''){ idx=+this.value; render(); window.scrollTo({top:0,behavior:'smooth'}); } }; }
    updateFcCounter(); return;
  }
  if(s.type==='read'){
    stage.appendChild(card);
    runBlock(card,{ tagClass:((s.diagram||s.image)?'img':'read'), tagIcon:((s.diagram||s.image)?'🖼️ ':'📖 '), tag:s.tag||'Leitura',
      title:s.title, src:s.src, lines:s.lines, diagram:s.diagram, image:s.image, illus:s.illus, items:s.questions, cards:s.cards,
      rereadMsg:'Volte ao texto, releia com calma e responda de novo.' });
    return;
  }
  if(s.type==='review'){
    stage.appendChild(card);
    runBlock(card,{ tagClass:'rev', tagIcon:'🔁 ', tag:'Micro-revisão', title:'Revisão — '+s.from,
      lines:s.remind, items:s.items, cards:null, studyBtn:'Já lembrei — responder →',
      rereadMsg:'Sem pressa: relembre o conteúdo e tente de novo (a resposta não aparece aqui).' });
    return;
  }
  if(s.type==='formula'){
    stage.appendChild(card);
    runBlock(card,{ tagClass:'fx', tagIcon:'🧮 ', tag:s.tag||'Fórmula', title:s.name, src:s.src,
      lines:s.studyLines, illus:s.illus, formula:s.formula, terms:s.terms, items:s.items, cards:s.cards,
      unitWord:'Questão', studyBtn:'Entendi — aplicar de memória →',
      rereadMsg:'Observe bem a fórmula e o que cada símbolo significa, depois volte.' });
    return;
  }
  if(s.type==='final'){
    stage.appendChild(card);
    runBlock(card,{ tagClass:'final', tagIcon:'🏁 ', tag:'Teste final', src:s.src,
      lines:s.intro, items:s.problems, cards:null, unitWord:'Questão',
      studyBtn:'Começar o teste →', rereadMsg:'Releia o enunciado com calma e tente de novo.' });
    return;
  }
  if(s.type==='deck'){ stage.appendChild(card); renderDeck(card); return; }
  if(s.type==='summary'){ stage.appendChild(card); renderSummary(card); return; }
}

/* ---- ilustrações / diagramas ---- */
function diagramSVG(kind, hl){
  if(kind==='tunnel'){
    return '<svg class="diagram" viewBox="0 0 460 180" role="img" aria-label="Trem entrando em um túnel">'+
      '<rect x="0" y="120" width="460" height="40" fill="#1b2347"/>'+
      '<path d="M120 120 Q230 20 340 120 Z" fill="#274a36" stroke="#3a6b4f" stroke-width="2"/>'+
      '<rect x="150" y="78" width="160" height="42" rx="6" fill="#0e1430" stroke="#3a3f72"/>'+
      '<text x="230" y="104" fill="#9fb0ff" font-size="12" text-anchor="middle">Túnel (200 m)</text>'+
      '<rect x="40" y="92" width="80" height="26" rx="5" fill="#7c8cff"/>'+
      '<rect x="44" y="96" width="16" height="10" fill="#0e1430"/><rect x="66" y="96" width="16" height="10" fill="#0e1430"/><rect x="88" y="96" width="16" height="10" fill="#0e1430"/>'+
      '<text x="80" y="135" fill="#a8aee0" font-size="11" text-anchor="middle">trem (100 m)</text>'+
      '<text x="40" y="86" fill="#56e0c4" font-size="11" text-anchor="middle">v₁=10</text>'+
      '<text x="410" y="112" fill="#56e0c4" font-size="11" text-anchor="middle">v₂=20</text>'+
      '<line x1="40" y1="150" x2="420" y2="150" stroke="#ffcf6b" stroke-width="1.5" stroke-dasharray="4 3"/>'+
      '<text x="230" y="172" fill="#ffe2a6" font-size="11" text-anchor="middle">Δs (traseira F)</text></svg>';
  }
  if(kind==='muv'){
    return '<svg class="diagram" viewBox="0 0 460 130" role="img" aria-label="Carro ganhando velocidade">'+
      '<line x1="20" y1="95" x2="445" y2="95" stroke="#3a3f72" stroke-width="2"/>'+
      carro(40,'10')+carro(150,'15')+carro(300,'20')+
      '<text x="40" y="118" fill="#a8aee0" font-size="11" text-anchor="middle">1 s</text>'+
      '<text x="150" y="118" fill="#a8aee0" font-size="11" text-anchor="middle">2 s</text>'+
      '<text x="300" y="118" fill="#a8aee0" font-size="11" text-anchor="middle">3 s</text>'+
      '<text x="230" y="22" fill="#9af0dd" font-size="13" text-anchor="middle">a velocidade aumenta sempre igual →</text></svg>';
  }
  if(kind==='signs'){
    return '<svg class="diagram" viewBox="0 0 460 160" role="img" aria-label="Acelerado e retardado">'+
      '<text x="120" y="24" fill="#9af0dd" font-size="13" font-weight="bold" text-anchor="middle">ACELERADO</text>'+
      '<text x="120" y="42" fill="#a8aee0" font-size="11" text-anchor="middle">v e α no mesmo sentido</text>'+
      '<line x1="30" y1="95" x2="210" y2="95" stroke="#3a3f72" stroke-width="2"/>'+
      arrow(60,80,'#56e0c4','v')+arrow(60,118,'#ffcf6b','α')+
      '<text x="120" y="150" fill="#9af0dd" font-size="11" text-anchor="middle">fica mais rápido</text>'+
      '<line x1="230" y1="15" x2="230" y2="150" stroke="#3a3f72" stroke-width="1"/>'+
      '<text x="345" y="24" fill="#ff9fb0" font-size="13" font-weight="bold" text-anchor="middle">RETARDADO</text>'+
      '<text x="345" y="42" fill="#a8aee0" font-size="11" text-anchor="middle">v e α em sentidos opostos</text>'+
      '<line x1="255" y1="95" x2="435" y2="95" stroke="#3a3f72" stroke-width="2"/>'+
      arrow(285,80,'#56e0c4','v')+arrowL(420,118,'#ffcf6b','α')+
      '<text x="345" y="150" fill="#ff9fb0" font-size="11" text-anchor="middle">fica mais devagar</text></svg>';
  }
  if(kind==='snail') return snailSVG(hl);
  if(kind==='octopus') return octopusSVG(hl);
  return '';
}
function carro(x,v){ return '<g><rect x="'+(x-18)+'" y="78" width="36" height="14" rx="4" fill="#7c8cff"/>'+
  '<rect x="'+(x-10)+'" y="70" width="20" height="9" rx="3" fill="#9aa6ff"/>'+
  '<circle cx="'+(x-9)+'" cy="93" r="4" fill="#0e1430"/><circle cx="'+(x+9)+'" cy="93" r="4" fill="#0e1430"/>'+
  '<text x="'+x+'" y="60" fill="#56e0c4" font-size="11" text-anchor="middle">'+v+' m/s</text></g>'; }
function arrow(x,y,c,l){ return '<g><line x1="'+x+'" y1="'+y+'" x2="'+(x+70)+'" y2="'+y+'" stroke="'+c+'" stroke-width="4"/>'+
  '<polygon points="'+(x+70)+','+(y-6)+' '+(x+84)+','+y+' '+(x+70)+','+(y+6)+'" fill="'+c+'"/>'+
  '<text x="'+(x+40)+'" y="'+(y-10)+'" fill="'+c+'" font-size="12" text-anchor="middle">'+l+'</text></g>'; }
function arrowL(x,y,c,l){ return '<g><line x1="'+x+'" y1="'+y+'" x2="'+(x-70)+'" y2="'+y+'" stroke="'+c+'" stroke-width="4"/>'+
  '<polygon points="'+(x-70)+','+(y-6)+' '+(x-84)+','+y+' '+(x-70)+','+(y+6)+'" fill="'+c+'"/>'+
  '<text x="'+(x-40)+'" y="'+(y-10)+'" fill="'+c+'" font-size="12" text-anchor="middle">'+l+'</text></g>'; }

function snailSVG(hl){
  const on=id=> (hl===id?'#56e0c4':'#5b639f');
  const lab=(!hl||hl==='labels');
  let s='<svg class="diagram" viewBox="0 0 420 240" role="img" aria-label="Caracol esquemático">';
  // pé (corpo)
  s+='<path d="M70 205 Q58 165 110 165 L300 165 Q345 165 352 188 Q354 208 320 208 L95 208 Q72 208 70 205 Z" fill="'+on('pe')+'" stroke="#2c3470" stroke-width="2"/>';
  // cabeça (frente direita)
  s+='<path d="M300 165 Q360 152 360 132 Q382 152 360 182 Q344 190 318 184 Z" fill="'+on('cabeca')+'" stroke="#2c3470" stroke-width="2"/>';
  // tentáculos
  s+='<line x1="352" y1="150" x2="376" y2="108" stroke="'+on('tentaculo')+'" stroke-width="5" stroke-linecap="round"/>';
  s+='<line x1="338" y1="152" x2="352" y2="114" stroke="'+on('tentaculo')+'" stroke-width="5" stroke-linecap="round"/>';
  s+='<circle cx="378" cy="104" r="5" fill="#0e1430"/><circle cx="352" cy="110" r="5" fill="#0e1430"/>';
  // concha (espiral aproximada)
  s+='<g><circle cx="180" cy="108" r="64" fill="'+on('concha')+'" stroke="#2c3470" stroke-width="2"/>'+
     '<circle cx="188" cy="112" r="44" fill="none" stroke="#2c3470" stroke-width="2" opacity=".55"/>'+
     '<circle cx="196" cy="116" r="26" fill="none" stroke="#2c3470" stroke-width="2" opacity=".55"/>'+
     '<circle cx="202" cy="118" r="11" fill="none" stroke="#2c3470" stroke-width="2" opacity=".55"/></g>';
  if(lab){
    s+=labtxt(180,34,'concha')+labtxt(120,232,'pé')+labtxt(372,212,'cabeça')+labtxt(398,92,'tentáculos');
  }
  s+='</svg>'; return s;
}
function octopusSVG(hl){
  const on=id=> (hl===id?'#56e0c4':'#6a5b9f');
  const lab=(!hl||hl==='labels');
  let s='<svg class="diagram" viewBox="0 0 420 240" role="img" aria-label="Polvo esquemático">';
  // manto (cabeça/corpo)
  s+='<ellipse cx="210" cy="80" rx="70" ry="58" fill="'+on('manto')+'" stroke="#2c3470" stroke-width="2"/>';
  // olho
  s+='<circle cx="186" cy="74" r="11" fill="'+on('olho')+'" stroke="#2c3470" stroke-width="2"/><circle cx="186" cy="74" r="4" fill="#0e1430"/>';
  // sifão
  s+='<path d="M250 110 q26 6 30 26" stroke="'+on('sifao')+'" stroke-width="9" fill="none" stroke-linecap="round"/>';
  // braços
  for(let k=0;k<6;k++){ const bx=160+k*20; s+='<path d="M'+bx+' 130 q '+(k%2?12:-12)+' 50 '+(k%2?4:-4)+' 95" stroke="'+on('bracos')+'" stroke-width="9" fill="none" stroke-linecap="round"/>'; }
  if(lab){ s+=labtxt(186,52,'olho')+labtxt(300,150,'sifão')+labtxt(150,235,'braços (com ventosas)')+labtxt(210,18,'manto'); }
  s+='</svg>'; return s;
}
function labtxt(x,y,t){ return '<text x="'+x+'" y="'+y+'" fill="#cdd4ff" font-size="12" text-anchor="middle">'+t+'</text>'; }

/* ---- baralho ---- */
function renderDeck(card){
  let pos=0;
  const cards=allCards();  // sempre o capítulo inteiro, independente de por onde se passou
  function draw(){
    card.className='card';
    if(!cards.length){ card.innerHTML='<p>Nenhum flashcard.</p>'; return; }
    const c=cards[pos];
    card.innerHTML='<div class="tag rev">📇 Revisão de flashcards</div>'+
      '<p class="hint">Cobrem todo o capítulo. Cartão <b>'+(pos+1)+'</b> de <b>'+cards.length+'</b>. Toque para virar.</p>'+
      '<div class="flash"><div class="flash-inner" id="fi"><div class="face front"><div class="fc-cat">'+c.cat+'</div>'+c.q+'</div>'+
      '<div class="face back"><div class="fc-cat">resposta</div>'+c.a+'</div></div></div>'+
      '<div class="row"><button class="btn alt" id="flip">Virar</button>'+
      (pos>0?'<button class="btn alt" id="prev">← Anterior</button>':'')+
      (pos<cards.length-1?'<button class="btn" id="nxc">Próximo →</button>':'<button class="btn ok" id="done">Terminar revisão →</button>')+'</div>';
    const fi=document.getElementById('fi'); const flip=()=>fi.classList.toggle('flip');
    fi.onclick=flip; document.getElementById('flip').onclick=flip;
    const nb=document.getElementById('nxc'); if(nb) nb.onclick=()=>{pos++;draw();};
    const pb=document.getElementById('prev'); if(pb) pb.onclick=()=>{pos--;draw();};
    const db=document.getElementById('done'); if(db) db.onclick=next;
  }
  draw();
}

/* ---- resumo (todos os itens, independe de progresso) ---- */
function allCards(){ const out=[]; STEPS.forEach(s=>{ (s.cards||[]).forEach(c=>{ if(!out.some(d=>d.q===c.q)) out.push({cat:c.cat||'Conceito',q:c.q,a:c.a}); }); }); return out; }
function showResumo(){
  stage.innerHTML='';
  const cards=allCards(); const groups={}, order=[];
  cards.forEach(c=>{ if(!groups[c.cat]){groups[c.cat]=[];order.push(c.cat);} groups[c.cat].push(c); });
  const palette=[['#4b46d6','#eeedfb'],['#1f9d6b','#e7f6ef'],['#d6483f','#fcecea'],['#b9770f','#fbf2e0'],['#0e7fa6','#e4f3f8'],['#8a3fb0','#f4ebf9'],['#c0397e','#fbe9f1']];
  let body=''; order.forEach((cat,ci)=>{ const[c,bg]=palette[ci%palette.length];
    body+='<div class="grp" style="--c:'+c+';--bg:'+bg+'"><h3>'+cat+'</h3>'+groups[cat].map(c=>'<div class="item"><b>'+c.q+'</b> — '+c.a+'</div>').join('')+'</div>'; });
  let figs='';
  if(chapter.key==='biologia'){
    const list=[['caracol','Caracol — anatomia (Fig. 25.2)'],['radula','Rádula (Fig. 25.3)'],['lula','Lula (Fig. 25.4)'],['polvo','Polvo (Fig. 25.9)']];
    figs='<div class="grp"><h3>Figuras para reconhecer</h3><div class="figrow">'+
      list.map(([k,t])=>'<figure class="rfig"><img src="'+IMG[k]+'"><figcaption>'+t+'</figcaption></figure>').join('')+'</div></div>';
  }
  const card=document.createElement('div'); card.className='card';
  card.innerHTML='<div class="row noprint" style="margin-top:0;margin-bottom:14px"><button class="btn alt" id="back">← Voltar</button><button class="btn" id="print">🖨️ Imprimir / salvar PDF</button></div>'+
    '<div id="resumoPrint" class="sheet"><h2>Resumo para decorar — '+chapter.title+'</h2>'+
    '<div class="sub">'+chapter.subject+' • '+chapter.source+' — '+cards.length+' itens essenciais (os mesmos dos flashcards)</div>'+body+figs+'</div>';
  stage.appendChild(card);
  document.getElementById('back').onclick=render;
  document.getElementById('print').onclick=()=>window.print();
}

/* ---- resumo final ---- */
function renderSummary(card){
  const pct=stats.attempts?Math.round(stats.correct/stats.attempts*100):0;
  card.className='card summary';
  card.innerHTML='<button class="backbar" id="home">← Matérias</button>'+
    '<div class="tag final">🎓 Capítulo concluído</div>'+
    '<div class="center"><div class="big">🎉</div><p class="lead">Você atravessou o capítulo de forma ativa: estudou e respondeu de memória.</p></div>'+
    '<div style="margin-top:18px">'+
      stat('Respostas corrigidas pelo app', stats.attempts)+
      stat('Acertos', stats.correct+' ('+pct+'%)')+
      stat('Vezes que voltou ao texto', stats.rereads)+
      stat('Flashcards do capítulo', allCards().length)+
    '</div>'+
    '<div class="feedback" style="margin-top:18px"><h4 style="color:var(--brand2)">Sobre os flashcards</h4>'+
    '<p>Os '+allCards().length+' cartões cobrem todo o conteúdo da fonte — independentemente do que você acertou hoje. '+
    'A revisão espaçada (numa versão completa) mostraria mais espaçados os que você domina e com mais frequência os que erra.</p></div>'+
    '<div class="row"><button class="btn" id="resumo">📄 Resumo de 1 página</button><button class="btn alt" id="again">Refazer capítulo</button><button class="btn alt" id="home2">Outra matéria</button></div>';
  document.getElementById('again').onclick=()=>startChapter(chapter.key);
  document.getElementById('home').onclick=home;
  document.getElementById('home2').onclick=home;
  document.getElementById('resumo').onclick=showResumo;
}
function stat(l,v){ return '<div class="stat"><span class="muted">'+l+'</span><b>'+v+'</b></div>'; }
